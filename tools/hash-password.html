<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CopyrightKiller — password hash generator</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 32rem; margin: 2rem auto; padding: 0 1rem; }
    input, button { font: inherit; padding: 0.5rem; }
    input { width: 100%; box-sizing: border-box; margin: 0.5rem 0 1rem; }
    pre { background: #f4f4f4; padding: 1rem; overflow-x: auto; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Password hash generator</h1>
  <p>Open this file locally, enter the download-page password, and paste the hash into <code>docs/index.html</code>.</p>
  <label for="pw">Password</label>
  <input id="pw" type="password" autocomplete="off" />
  <button type="button" id="go">Generate SHA-256 hash</button>
  <pre id="out" hidden></pre>
  <script>
    async function sha256(text) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buf), (b) => b.toString(16).padStart(2, "0")).join("");
    }
    document.getElementById("go").onclick = async () => {
      const pw = document.getElementById("pw").value;
      if (!pw) return;
      const hash = await sha256(pw);
      const out = document.getElementById("out");
      out.hidden = false;
      out.textContent = hash;
    };
  </script>
</body>
</html>
